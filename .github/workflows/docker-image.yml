name: Docker image

on:
  push:
    branches: [main, master]
    paths:
      - Dockerfile
      - setup-shell.sh
      - .github/workflows/docker-image.yml
  pull_request:
    branches: [main, master]
    paths:
      - Dockerfile
      - setup-shell.sh
      - .github/workflows/docker-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    concurrency:
      group: docker-image-${{ github.workflow }}-${{ github.ref }}-${{ matrix.variant }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: gpu
            base_image: runpod/base:1.0.3-cuda1281-ubuntu2404
            # latest + gpu + gpu-<sha> on default branch; branch name on other branches
            meta_tags: |
              type=raw,value=latest,enable={{is_default_branch}}
              type=raw,value=gpu
              type=ref,event=branch
              type=sha,prefix=gpu-
          - variant: cpu
            base_image: runpod/base:1.0.3-ubuntu2404
            meta_tags: |
              type=raw,value=cpu
              type=ref,event=branch
              type=sha,prefix=cpu-
    steps:
      - uses: actions/checkout@v4

      - name: Image name (Docker requires lowercase)
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: ${{ matrix.meta_tags }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
